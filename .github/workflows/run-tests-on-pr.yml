name: Run Tests on Pull Request

on:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run tests
        id: run-tests
        run: PYTHONPATH=. pytest tests/
        continue-on-error: true

      - name: Create or update issue on test failure
        if: steps.run-tests.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "Test failed on PR #${{ github.event.pull_request.number }}"
          ISSUE_BODY: |
            Tests failed on PR #${{ github.event.pull_request.number }}

            - PR: ${{ github.event.pull_request.html_url }}
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing_issue_number="$(gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --search "$ISSUE_TITLE" \
            --json number \
            --jq '.[0].number')"

          if [ -z "$existing_issue_number" ]; then
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              --repo ${{ github.repository }}
          else
            gh issue comment "$existing_issue_number" \
              --body "$ISSUE_BODY"
          fi

      - name: Fail if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1
